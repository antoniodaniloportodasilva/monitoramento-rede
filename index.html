<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC Network Monitor</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:Arial, Helvetica, sans-serif;
background:#0b0f14;
color:#e6edf3;
padding:20px;

}

header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

h1{

color:#58a6ff;
font-size:22px;

}

.clock{

font-size:18px;
color:#3fb950;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;

}

.card{

background:#161b22;
padding:20px;
border-radius:10px;
border:1px solid #30363d;

}

.title{

font-size:13px;
color:#8b949e;

}

.value{

font-size:24px;
margin-top:8px;
font-weight:bold;

}

.online{

color:#3fb950;

}

.offline{

color:#f85149;

}

.chart{

margin-top:30px;
background:#161b22;
padding:20px;
border-radius:10px;

}

canvas{

width:100%;
height:200px;

}

footer{

margin-top:30px;
text-align:center;
font-size:12px;
color:#8b949e;

}

</style>

</head>

<body>

<header>

<h1>NOC Network Monitor</h1>

<div class="clock" id="clock"></div>

</header>

<div class="grid">

<div class="card">
<div class="title">Status da Internet</div>
<div class="value" id="status">Verificando...</div>
</div>

<div class="card">
<div class="title">Latência</div>
<div class="value" id="latency">-- ms</div>
</div>

<div class="card">
<div class="title">IP Público</div>
<div class="value" id="ip">--</div>
</div>

<div class="card">
<div class="title">Data</div>
<div class="value" id="date">--</div>
</div>

</div>

<div class="chart">

<div class="title">Latência em tempo real</div>

<canvas id="latencyChart"></canvas>

</div>

<footer>

Network Operations Center Dashboard

</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let latencyData = [];
let labels = [];

const ctx = document.getElementById('latencyChart');

const chart = new Chart(ctx,{

type:'line',

data:{
labels:labels,
datasets:[{
label:'Latency ms',
data:latencyData,
borderColor:'#58a6ff',
backgroundColor:'rgba(88,166,255,0.2)',
tension:0.3
}]
},

options:{
responsive:true,
scales:{
y:{
beginAtZero:true
}
}
}

});

async function getIP(){

try{

let res = await fetch("https://api.ipify.org?format=json");

let data = await res.json();

document.getElementById("ip").innerText = data.ip;

}catch{

document.getElementById("ip").innerText="Erro";

}

}

function testLatency(){

let start = Date.now();

fetch("https://www.google.com",{mode:"no-cors"})

.then(()=>{

let latency = Date.now() - start;

document.getElementById("latency").innerText = latency + " ms";

document.getElementById("status").innerText="ONLINE";
document.getElementById("status").className="value online";

updateChart(latency);

})

.catch(()=>{

document.getElementById("status").innerText="OFFLINE";
document.getElementById("status").className="value offline";

});

}

function updateChart(latency){

let time = new Date().toLocaleTimeString();

labels.push(time);
latencyData.push(latency);

if(labels.length > 20){

labels.shift();
latencyData.shift();

}

chart.update();

}

function updateClock(){

let now = new Date();

document.getElementById("clock").innerText =
now.toLocaleTimeString("pt-BR");

document.getElementById("date").innerText =
now.toLocaleDateString("pt-BR");

}

getIP();
updateClock();
testLatency();

setInterval(updateClock,1000);
setInterval(testLatency,5000);

</script>

</body>
</html>
