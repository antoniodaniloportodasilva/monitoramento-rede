<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Network Monitor</title>

<style>

body{
font-family:Arial;
background:#0d1117;
color:#c9d1d9;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#58a6ff;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#161b22;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.title{
font-size:14px;
color:#8b949e;
}

.value{
font-size:24px;
margin-top:10px;
color:#3fb950;
}

.status-online{
color:#3fb950;
}

.status-offline{
color:#f85149;
}

footer{
margin-top:40px;
text-align:center;
font-size:12px;
color:#8b949e;
}

</style>

</head>

<body>

<h1>Network Monitoring Dashboard</h1>

<div class="container">

<div class="card">
<div class="title">Status da Internet</div>
<div class="value" id="status">Verificando...</div>
</div>

<div class="card">
<div class="title">Latência Internet</div>
<div class="value" id="ping">-- ms</div>
</div>

<div class="card">
<div class="title">Ping Rede Local</div>
<div class="value" id="pinglocal">-- ms</div>
</div>

<div class="card">
<div class="title">IP Público</div>
<div class="value" id="ip">--</div>
</div>

<div class="card">
<div class="title">Data</div>
<div class="value" id="date">--</div>
</div>

<div class="card">
<div class="title">Hora</div>
<div class="value" id="clock">--</div>
</div>

</div>

<footer>
Network Monitor • GitHub Dashboard
</footer>

<script>

async function getIP(){

try{

let res = await fetch("https://api.ipify.org?format=json");
let data = await res.json();

document.getElementById("ip").innerText = data.ip;

}catch{

document.getElementById("ip").innerText = "Erro";

}

}

function internetPing(){

let start = Date.now();

fetch("https://www.google.com", {mode:"no-cors"})
.then(()=>{

let latency = Date.now() - start;

document.getElementById("ping").innerText = latency + " ms";

document.getElementById("status").innerText="ONLINE";
document.getElementById("status").className="value status-online";

})
.catch(()=>{

document.getElementById("status").innerText="OFFLINE";
document.getElementById("status").className="value status-offline";

});

}

async function localPing(){

try{

let start = Date.now();

await fetch("http://192.168.0.1", {mode:"no-cors"});

let latency = Date.now() - start;

document.getElementById("pinglocal").innerText = latency+" ms";

}catch{

document.getElementById("pinglocal").innerText="Falha";

}

}

function updateClock(){

let now = new Date();

let date = now.toLocaleDateString("pt-BR");

let time = now.toLocaleTimeString("pt-BR");

document.getElementById("date").innerText = date;
document.getElementById("clock").innerText = time;

}

getIP();

internetPing();
localPing();
updateClock();

setInterval(internetPing,5000);
setInterval(localPing,5000);
setInterval(updateClock,1000);

</script>

</body>
</html>
